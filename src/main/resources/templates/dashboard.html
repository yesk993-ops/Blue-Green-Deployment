<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - Goldencat Bank</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            /* Default fallback gradient */
            background: linear-gradient(to right, #000000, #ffd700);
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-custom {
            background-color: rgba(0, 0, 0, 0.9);
            width: 100%;
            z-index: 1000;
        }

        .navbar-custom a {
            color: #ffffff !important;
        }

        .navbar-custom .navbar-brand {
            font-weight: bold;
        }

        /* Dynamic Environment Banner */
        #envBanner {
            text-align: center;
            padding: 8px;
            font-weight: bold;
            color: white;
            width: 100%;
            background-color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            flex: 1;
        }

        .account-details, .form-container {
            background-color: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background-color: #000000;
            border: 1px solid #ffd700;
            color: #ffd700;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #ffd700;
            color: #000;
        }

        .btn-success {
            background-color: #28a745;
            border: none;
        }

        .error {
            color: #ff4c4c;
            font-weight: bold;
        }

        .footer {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 0;
            font-size: 14px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body id="mainBody">

<nav class="navbar navbar-expand-lg navbar-custom">
    <a class="navbar-brand" href="#">Goldencat Bank</a>
    <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/transactions">Transactions</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
    </ul>
</nav>

<div id="envBanner">Detecting Deployment Version...</div>

<div class="container dashboard-container">
    <div class="text-center mb-4">
        <h2 th:text="'Welcome, ' + ${account.username}"></h2>
        <h3 th:text="'Current Balance: $' + ${account.balance}"></h3>
    </div>

    <div class="account-details">
        <h4>Account Details</h4>
        <p><strong>Account Number:</strong> <span th:text="${account.id}"></span></p>
        <p><strong>Account Type:</strong> Savings</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-4 mb-3">
            <button class="btn btn-block btn-primary" type="button" data-toggle="collapse" data-target="#depositForm">
                Deposit
            </button>
            <div class="collapse mt-3" id="depositForm">
                <form method="post" action="/deposit" class="form-container">
                    <div class="form-group">
                        <label>Amount:</label>
                        <input type="number" class="form-control" name="amount" required />
                    </div>
                    <button type="submit" class="btn btn-block btn-success">Submit Deposit</button>
                </form>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <button class="btn btn-block btn-primary" type="button" data-toggle="collapse" data-target="#withdrawForm">
                Withdraw
            </button>
            <div class="collapse mt-3" id="withdrawForm">
                <form method="post" action="/withdraw" class="form-container">
                    <div class="form-group">
                        <label>Amount:</label>
                        <input type="number" class="form-control" name="amount" required />
                    </div>
                    <button type="submit" class="btn btn-block btn-success">Submit Withdrawal</button>
                </form>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <button class="btn btn-block btn-primary" type="button" data-toggle="collapse" data-target="#transferForm">
                Transfer Money
            </button>
            <div class="collapse mt-3" id="transferForm">
                <form method="post" action="/transfer" class="form-container">
                    <div class="form-group">
                        <label>Recipient Username:</label>
                        <input type="text" class="form-control" name="toUsername" required />
                    </div>
                    <div class="form-group">
                        <label>Amount:</label>
                        <input type="number" class="form-control" name="amount" required />
                    </div>
                    <button type="submit" class="btn btn-block btn-success">Submit Transfer</button>
                </form>
            </div>
        </div>
    </div>

    <p th:if="${error != null}" th:text="${error}" class="error text-center mt-3"></p>
</div>

<footer class="footer">
    <p>&copy; 2026 Goldencat Bank - Secure Banking Systems</p>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    // Fetches the environment string (e.g., "V1-BLUE") from your BankController
    fetch('/env')
    .then(res => res.text())
    .then(data => {
        const banner = document.getElementById("envBanner");
        const body = document.getElementById("mainBody");

        banner.innerText = "Active Deployment: " + data;

        if(data.includes("BLUE")){
            // Blue Theme: Navy to Bright Blue Gradient
            body.style.background = "linear-gradient(to right, #001f3f, #007bff)";
            banner.style.backgroundColor = "#004085"; 
        } 
        else if(data.includes("GREEN")){
            // Green Theme: Dark Forest to Emerald Gradient
            body.style.background = "linear-gradient(to right, #0a2f10, #28a745)";
            banner.style.backgroundColor = "#155724";
        }
    })
    .catch(err => {
        console.log("Could not fetch env info, using default gold theme.");
        document.getElementById("envBanner").innerText = "Environment: Default (Gold)";
    });
</script>
</body>
</html>
